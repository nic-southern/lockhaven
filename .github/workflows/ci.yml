name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v4

      - run: semgrep ci

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm format:check

      - run: pnpm build

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-containers:
    needs:
      - semgrep
      - verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: web
            package: lockhaven-web
            context: .
            file: apps/web/Dockerfile
          - name: worker
            package: lockhaven-worker
            context: .
            file: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.package }}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:main

  deploy:
    needs:
      - publish-containers
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AUTO_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "Set repository secrets DEPLOY_HOST and DEPLOY_SSH_PRIVATE_KEY, then set variable AUTO_DEPLOY=true." >&2
            exit 1
          fi

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose and update script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          user="${DEPLOY_SSH_USER:-root}"
          host="$DEPLOY_HOST"
          ssh_opts=(-o BatchMode=yes -o StrictHostKeyChecking=yes)
          ssh "${ssh_opts[@]}" "${user}@${host}" "mkdir -p /opt/lockhaven/deploy /opt/lockhaven/scripts"
          scp "${ssh_opts[@]}" \
            deploy/production.compose.yml \
            "${user}@${host}:/opt/lockhaven/deploy/production.compose.yml"
          scp "${ssh_opts[@]}" \
            scripts/remote-compose-update.sh \
            "${user}@${host}:/opt/lockhaven/scripts/remote-compose-update.sh"
          ssh "${ssh_opts[@]}" "${user}@${host}" \
            "chmod 0755 /opt/lockhaven/scripts/remote-compose-update.sh"

      - name: Pull images, migrate, and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          user="${DEPLOY_SSH_USER:-root}"
          host="$DEPLOY_HOST"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${user}@${host}" \
            "/opt/lockhaven/scripts/remote-compose-update.sh"
